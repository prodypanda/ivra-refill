name: Bug Report
description: Report a problem with the Ivra app.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - Web
        - Supabase
        - Documentation
    validations:
      required: true
  - type: dropdown
    id: role
    attributes:
      label: Role
      options:
        - app_admin
        - app_manager
        - hotel_manager
        - hotel_staff
        - not signed in
        - not sure
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      placeholder: |
        1. Sign in as ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Result
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes Or Screenshots

