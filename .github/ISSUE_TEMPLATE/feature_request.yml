name: Feature Request
description: Suggest an improvement for Ivra.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What operational problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What should the app do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Refill workflow
        - Inventory
        - Approvals
        - Alerts
        - Reports
        - Team/accounts
        - Offline sync
        - Supabase/backend
        - Android
        - Web
        - Documentation
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - A hotel manager can ...
        - An app manager can ...
        - Staff cannot ...

