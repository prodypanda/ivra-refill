# GitLab CI for the ivra-refill Flutter app.
# Mirrors the existing GitHub Actions workflow (.github/workflows/flutter-ci.yml):
# Flutter 3.44.0 (stable), Java 17, analyze + test (with coverage) + build.

stages:
  - setup
  - test
  - build

# Pinned to match .github/workflows/flutter-ci.yml.
# The ghcr.io/cirruslabs images bundle the Flutter SDK and Android tooling.
default:
  image: ghcr.io/cirruslabs/flutter:3.44.0
  tags:
    - saas-linux-medium-amd64

variables:
  # Keep pub's cache inside the project dir so GitLab can cache it between jobs.
  PUB_CACHE: "$CI_PROJECT_DIR/.pub-cache"

# Share the downloaded packages across jobs, keyed on the lockfile.
cache:
  key:
    files:
      - pubspec.lock
  paths:
    - .pub-cache/
    - .dart_tool/

# Run on merge request pipelines and on the default branch, avoiding
# duplicate branch+MR pipelines.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

.flutter_setup: &flutter_setup
  before_script:
    - flutter --version
    - flutter pub get

pub_get:
  stage: setup
  <<: *flutter_setup
  script:
    - echo "Dependencies resolved."

analyze:
  stage: test
  needs:
    - pub_get
  <<: *flutter_setup
  script:
    - flutter analyze --no-fatal-infos --no-fatal-warnings

test:
  stage: test
  needs:
    - pub_get
  <<: *flutter_setup
  script:
    - flutter test --coverage
  # Surface line coverage in the MR widget.
  # lcov.info is produced by `flutter test --coverage`.
  coverage: '/lines\.*: \d+\.\d+\%/'
  artifacts:
    when: always
    paths:
      - coverage/lcov.info
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura.xml
  after_script:
    # Convert lcov to Cobertura so GitLab can show coverage in the diff view.
    # lcov_cobertura is a small, dependency-free Python tool.
    - dart pub global activate cobertura 2>/dev/null || true
    - |
      if command -v python3 >/dev/null 2>&1 && [ -f coverage/lcov.info ]; then
        pip3 install --quiet lcov_cobertura || true
        python3 -m lcov_cobertura coverage/lcov.info -o coverage/cobertura.xml || true
      fi

build_web:
  stage: build
  needs:
    - analyze
    - test
  <<: *flutter_setup
  script:
    - flutter build web --release
  artifacts:
    paths:
      - build/web/
    expire_in: 1 week

build_android:
  stage: build
  needs:
    - analyze
    - test
  <<: *flutter_setup
  script:
    - flutter build apk --debug
  artifacts:
    paths:
      - build/app/outputs/flutter-apk/app-debug.apk
    expire_in: 1 week
