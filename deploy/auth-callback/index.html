<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #faf5e6;
      font-family: system-ui, sans-serif;
      color: #333;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 16px;
      border: 4px solid #e0d6b8;
      border-top-color: #c8a951;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Redirecting to IVRA...</p>
  </div>

  <div class="fallback-container" id="fallback" style="display: none; text-align: center; max-width: 400px; padding: 24px; background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
    <h2 style="color: #c8a951; margin-top: 0;">Opening IVRA App</h2>
    <p style="color: #666; line-height: 1.5; margin-bottom: 24px;">
      You've been redirected to the IVRA app. If the app opened successfully, you can safely close this tab.
    </p>
    <p style="color: #666; line-height: 1.5; margin-bottom: 24px;">
      If you don't have the app installed, or it didn't open automatically, you can continue in your browser.
    </p>
    <button onclick="window.location.href='/app/set-password'" style="background: #c8a951; color: white; border: none; padding: 14px 24px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%;">
      Continue in Browser
    </button>
  </div>

  <script>
    (function() {
      // If we are already in the fallback state, show the fallback UI immediately.
      var urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('fallback') === 'true') {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('fallback').style.display = 'block';
        return;
      }

      var hash = window.location.hash.substring(1);
      if (hash) {
        var params = new URLSearchParams(hash);
        var refreshToken = params.get('refresh_token');
        if (refreshToken) {
          sessionStorage.setItem('ivra_auth_refresh_token', refreshToken);

          var ua = navigator.userAgent || '';
          var isMobile = /android|iphone|ipad|ipod/i.test(ua);
          
          if (isMobile && /android/i.test(ua)) {
            // Point the fallback back to this page with ?fallback=true
            // This prevents Chrome from automatically throwing the user into
            // the web app's password screen if the intent resolves weirdly.
            var fallbackUrl = encodeURIComponent('https://refill.ivra-cosmetics.com/auth/callback?fallback=true');
            var intentUrl = 'intent://app/set-password?refresh_token=' + encodeURIComponent(refreshToken) +
                            '#Intent;scheme=ivra;package=com.ivra.refill;S.browser_fallback_url=' + fallbackUrl + ';end';
            window.location.replace(intentUrl);
            
            // Just in case the intent silently fails without triggering fallbackUrl
            setTimeout(function() {
              document.getElementById('loader').style.display = 'none';
              document.getElementById('fallback').style.display = 'block';
            }, 2500);
            return;
          }

          // Let's redirect them to the web app so they can set their password there.
          window.location.replace('/app/set-password');
          return;
        }
      }
      
      // Fallback: no tokens, no fallback flag -> go to app root
      window.location.replace('/app/');
    })();
  </script>
</body>
</html>
