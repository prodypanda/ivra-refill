
name: ivra_refill
description: Ivra hotel refill operations app for Android and web.
publish_to: none
version: 1.0.34+35

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  app_links: ^6.3.2
  collection: ^1.18.0
  csv: ^6.0.0
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  http: ^1.2.0
  intl: ^0.20.2
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^11.1.0
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.0
  supabase_flutter: ^2.8.1
  uuid: ^4.5.1
  fl_chart: ^1.2.0
  shimmer: ^3.0.0
  google_fonts: ^8.1.0
  local_auth: ^3.0.1
  workmanager: ^0.9.0+3
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^21.0.0
  image_picker: ^1.2.2
  device_info_plus: ^12.4.0
  cached_network_image: ^3.4.1
  mobile_scanner: ^7.2.0
  home_widget: ^0.9.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

# path_provider_android 2.3.x switched its native layer to a JNI-based
# implementation (depends on `jni`/`jni_flutter`), which generates a
# `com.github.dart_lang.jni.JniPlugin` reference in GeneratedPluginRegistrant.
# On this project's Android setup that class is not resolved on the compile
# classpath, so clean builds fail with "cannot find symbol JniPlugin". Pinning
# to the last 2.2.x release keeps the platform-channel implementation and avoids
# pulling in jni entirely. (path_provider is a transitive dep via supabase_flutter.)
#
# TRACKING: this is a workaround, not a fix. Remove this override once a clean
# `flutter build apk` succeeds with the unpinned transitive version (re-test
# after each supabase_flutter / path_provider_android upgrade). Keep the pin
# until then to avoid breaking Android builds.
dependency_overrides:
  path_provider_android: 2.2.17

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/fonts/DejaVuSans.ttf
    - assets/fonts/DejaVuSans-Bold.ttf
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/logo.png"
  android_12:
    image: "assets/images/logo.png"
    color: "#FFFFFF"
